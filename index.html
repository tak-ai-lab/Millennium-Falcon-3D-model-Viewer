<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Millennium Falcon Viewer</title>
    <meta name="description" content="スター・ウォーズに登場するミレニアム・ファルコン号の3Dモデルを、マウスで自由に回転・ズームして眺められるインタラクティブサイトです。" />
    <link rel="stylesheet" href="/src/style.css" />

    <!-- OGP設定(Facebook, LINE, Slackなどでのリンク共有時に表示される情報) -->
    <meta property="og:title" content="THE MILLENNIUM FALCON | 3D Viewer" />
    <meta property="og:description" content="スター・ウォーズに登場するミレニアム・ファルコン号の3Dモデルを、マウスで自由に回転・ズームして眺められるインタラクティブサイトです。" />
    <meta property="og:image" content="https://millennium-falcon-3d-viewer.vercel.app/ogp-image.png" />
    <meta property="og:url" content="https://millennium-falcon-3d-viewer.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Millennium Falcon 3D Viewer" />

    <!-- X(旧Twitter)でのカード表示用 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="THE MILLENNIUM FALCON | 3D Viewer" />
    <meta name="twitter:description" content="スター・ウォーズに登場するミレニアム・ファルコン号の3Dモデルを、マウスで自由に回転・ズームして眺められるインタラクティブサイトです。" />
    <meta name="twitter:image" content="https://millennium-falcon-3d-viewer.vercel.app/ogp-image.png" />
  </head>
  <body>
    <div id="app"></div>

    <!-- タイトル表示 -->
    <div id="title-overlay">
      <h1>THE MILLENNIUM FALCON</h1>
    </div>

    <!-- ローディング表示 -->
    <div id="loading-overlay">
      <div id="loading-text">Loading</div>
